name: CI/CD Pipeline C

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - uses: actions/checkout@v3

      # 2️⃣ Installer GCC
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # 3️⃣ Build
      - name: Build program
        run: make

      # 4️⃣ Tests
      - name: Run tests
        run: make test

      # 5️⃣ Stocker le binaire comme artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: my_program
          path: build/my_program

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Télécharger artifact
      - uses: actions/download-artifact@v3
        with:
          name: my_program

      # Déploiement sur serveur
      - run: scp build/my_program user@server:/home/user/deploy/
